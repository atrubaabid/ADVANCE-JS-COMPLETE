<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
        }

        #productSection {
            width: 100%;
            padding: 10px 0;
        }

        .main {
            width: 1320px;
            margin: auto;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        #productSection h1 {
            text-align: center;
            font-size: 30px;
            margin-bottom: 30px;

        }

        .productItems img {
            width: 100%;
            height: 250px;
        }

        .madalElement {
            position: fixed;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            display: none;
        }

        .whitemodal {
            width: 600px;
            position: fixed;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            height: 500px;
            background-color: white;
        }

        .whitemodal img {
            width: 100%;
            height: 100%;

        }

        .whitemodal span {
            position: absolute;
            right: 10px;
            cursor: pointer;
            font-size: 40px;
            color: rgb(88, 86, 86);
        }
    </style>
</head>

<body>

</body>
<script>
    let main = document.querySelector(".main");
    let modaldiv = document.querySelector(".madalElement")
    let modalimg = document.querySelector(".whitemodal img")
    let whitemodal = document.querySelector(".whitemodal")
    let span = document.querySelector(".btn")


    //SHOW MODAL
    main.addEventListener("click", (e) => {
        if (e.target.tagName == "IMG") {
            let imgsrc = e.target.src
            modaldiv.style.display = "block";
            modalimg.src = imgsrc
        }
    })

    //CLOSE IMG DIV
    span.addEventListener("click", () => {
        modaldiv.style.display = "none";
        modalimg.src = "";

    })
    //CLOSE IMG DIV
    modaldiv.addEventListener("click", () => {
        modaldiv.style.display = "none";
        modalimg.src = "";
    })
    //STOP BUBBLING
    whitemodal.addEventListener("click", (e) => {
        e.stopPropagation()
    })


</script>
