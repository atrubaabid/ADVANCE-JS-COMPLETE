      .productItems img {

      .madalElement {
        position: fixed;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.5);
        display: none;
      }

      .whitemodal {
        width: 60%;
        height: 70%;
        position: fixed;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        background-color: white;
      }

      .whitemodal img {
        width: 100%;
        height: 100%;
      }

      .whitemodal span {
        position: absolute;
        right: 10px;
        cursor: pointer;
        font-size: 40px;
        color: rgb(88, 86, 86);

  <script>
    let main = document.querySelector(".main");
    let modaldiv = document.querySelector(".madalElement");
    let modalimg = document.querySelector(".whitemodal img");
    let whitemodal = document.querySelector(".whitemodal");
    let span = document.querySelector(".btn");

    //SHOW MODAL
    main.addEventListener("click", (e) => {
      if (e.target.tagName == "IMG") {
        let imgsrc = e.target.src;
        modaldiv.style.display = "block";
        modalimg.src = imgsrc;
      }
    });

    //CLOSE IMG DIV
    span.addEventListener("click", () => {
      modaldiv.style.display = "none";
      modalimg.src = "";
    });
    //CLOSE IMG DIV
    modaldiv.addEventListener("click", () => {
      modaldiv.style.display = "none";
      modalimg.src = "";
    });
    //STOP BUBBLING
    whitemodal.addEventListener("click", (e) => {
      e.stopPropagation();
    });
  </script>
